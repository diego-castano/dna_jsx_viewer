<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSX Viewer — DNA</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <meta name="description" content="DNA JSX Viewer — Visualizador de archivos JSX con preview visual y syntax highlighting.">
  <meta name="author" content="Digital HENKA">
  <meta name="theme-color" content="#2C4135">

  <meta property="og:type" content="website">
  <meta property="og:title" content="JSX Viewer — DNA">
  <meta property="og:description" content="Visualizador de archivos JSX con preview visual, syntax highlighting y almacenamiento en la nube.">
  <meta property="og:image" content="/logo.avif">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="design_system/dna-design-system-v2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--surface-primary, #F0EFEB);
      font-family: var(--font-body, 'DM Sans', sans-serif);
      color: var(--label-primary, #030000);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .topbar {
      background: var(--surface-brand, #2C4135);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar__logo img { height: 32px; width: auto; display: block; }
    .topbar__title {
      font-family: var(--font-display, 'Playfair Display', serif);
      font-size: 20px; font-weight: 700;
      color: var(--label-on-dark, #F0EFEB);
    }
    .topbar__badge {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      background: rgba(131,198,163,0.15); color: var(--color-accent-mint, #83C6A3);
      padding: 4px 10px; border-radius: 980px;
    }
    .topbar__status {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: rgba(240,239,235,0.5);
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
    }
    .topbar__dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-accent-mint, #83C6A3);
      animation: pulse-dot 2s infinite;
    }
    .topbar__dot--offline { background: #FF9500; animation: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px; min-width: 280px;
      background: var(--surface-secondary, #FAFAF8);
      border-right: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      display: flex; flex-direction: column; flex-shrink: 0;
      z-index: 10; position: relative;
      transition: width 300ms cubic-bezier(0.16, 1, 0.3, 1), min-width 300ms cubic-bezier(0.16, 1, 0.3, 1), padding 300ms;
    }
    .sidebar.is-collapsed {
      width: 0; min-width: 0; overflow: hidden; border-right: none; padding: 0;
    }
    .sidebar__header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .sidebar__title {
      margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.06em;
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 11px; font-weight: 600; color: var(--label-tertiary, rgba(3,0,0,0.45));
    }

    /* ── Sidebar toggle ── */
    .sidebar-toggle {
      position: absolute; top: 50%; right: -14px; z-index: 20;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface-secondary, #FAFAF8); border: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px; color: var(--label-tertiary);
      box-shadow: 0 2px 6px rgba(3,0,0,0.08); transition: all 200ms;
      transform: translateY(-50%);
    }
    .sidebar-toggle:hover { background: #fff; color: var(--label-primary); box-shadow: 0 2px 12px rgba(3,0,0,0.12); }
    .sidebar.is-collapsed .sidebar-toggle { right: -38px; }

    /* Expand button (shown when collapsed) */
    .sidebar-expand {
      position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 20;
      width: 28px; height: 56px; border-radius: 0 8px 8px 0;
      background: var(--surface-secondary, #FAFAF8); border: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      border-left: none; display: none; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; color: var(--label-tertiary);
      box-shadow: 2px 0 8px rgba(3,0,0,0.06); transition: all 200ms;
    }
    .sidebar-expand:hover { background: #fff; color: var(--label-primary); }
    .sidebar-expand.is-visible { display: flex; }

    /* ── Search ── */
    .search { margin: 0 20px 12px; position: relative; }
    .search__icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.4; }
    .search__input {
      width: 100%; padding: 8px 12px 8px 34px;
      border: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      border-radius: 980px; background: var(--surface-tertiary, #fff);
      font-family: var(--font-body, 'DM Sans', sans-serif); font-size: 12px;
      color: var(--label-primary); outline: none; transition: all 200ms;
    }
    .search__input:focus { border-color: var(--color-accent-mint, #83C6A3); box-shadow: 0 0 0 3px rgba(131,198,163,0.15); }

    /* ── Upload ── */
    .upload {
      margin: 0 20px 16px; border: 2px dashed var(--separator-strong, rgba(3,0,0,0.15));
      border-radius: 16px; padding: 20px; text-align: center; cursor: pointer;
      transition: all 320ms; background: transparent; position: relative;
    }
    .upload:hover, .upload.is-dragover {
      border-color: var(--color-accent-mint, #83C6A3); background: rgba(131,198,163,0.06);
    }
    .upload.is-uploading { pointer-events: none; opacity: 0.6; }
    .upload__icon { font-size: 28px; margin-bottom: 6px; }
    .upload__text { font-size: 13px; font-weight: 500; color: var(--label-secondary); margin: 0 0 2px; }
    .upload__hint { font-size: 11px; color: var(--label-tertiary, rgba(3,0,0,0.45)); margin: 0; }
    .upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .progress { margin: -8px 20px 16px; height: 3px; background: rgba(3,0,0,0.06); border-radius: 2px; overflow: hidden; display: none; }
    .progress.is-active { display: block; }
    .progress__bar { height: 100%; background: var(--color-accent-mint, #83C6A3); border-radius: 2px; width: 0%; transition: width 300ms; }

    .sidebar__count {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 10px; color: var(--label-tertiary); padding: 0 20px 8px;
    }

    /* ── File List ── */
    .file-list { flex: 1; overflow-y: auto; padding: 0 12px 20px; }
    .file-list__group {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--label-tertiary); padding: 12px 8px 6px;
      position: sticky; top: 0; background: var(--surface-secondary, #FAFAF8); z-index: 1;
    }
    .file-item {
      display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px;
      cursor: pointer; transition: all 200ms; border: 1px solid transparent; position: relative;
    }
    .file-item:hover { background: var(--surface-tertiary, #fff); box-shadow: 0 2px 8px rgba(3,0,0,0.06); }
    .file-item.is-active {
      background: var(--surface-tertiary, #fff);
      border-color: var(--color-accent-mint, #83C6A3);
      box-shadow: 0 2px 8px rgba(3,0,0,0.06), 0 0 0 3px rgba(131,198,163,0.15);
    }
    .file-item__icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #C9E5C3, #83C6A3);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      color: var(--surface-brand, #2C4135); font-weight: 700;
      font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: 11px;
    }
    .file-item__info { flex: 1; min-width: 0; }
    .file-item__name {
      font-size: 13px; font-weight: 600; color: var(--label-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-item__desc {
      font-size: 11px; color: var(--color-accent-mint, #83C6A3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-style: italic; margin-top: 1px;
    }
    .file-item__meta {
      font-size: 11px; color: var(--label-tertiary); margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .file-item__size { font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: 10px; }
    .file-item__delete {
      position: absolute; top: 8px; right: 8px; width: 20px; height: 20px;
      border-radius: 50%; border: none; background: rgba(255,59,48,0.08);
      color: #FF3B30; font-size: 12px; cursor: pointer; opacity: 0; transition: opacity 200ms;
      display: flex; align-items: center; justify-content: center;
    }
    .file-item:hover .file-item__delete { opacity: 1; }

    /* ── Viewer ── */
    .viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; position: relative; z-index: 1; }

    .viewer__toolbar {
      padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      background: var(--surface-secondary, #FAFAF8); flex-shrink: 0; flex-wrap: wrap;
    }
    .viewer__filename {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 13px; font-weight: 600; color: var(--label-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 1;
    }
    .viewer__line-count {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 11px; color: var(--label-tertiary);
    }
    .viewer__actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
    .viewer__btn {
      font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: 11px; font-weight: 600;
      padding: 5px 12px; border-radius: 980px;
      border: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      background: var(--surface-tertiary, #fff); color: var(--label-tertiary, rgba(3,0,0,0.45));
      cursor: pointer; transition: all 200ms; letter-spacing: 0.02em;
    }
    .viewer__btn:hover { opacity: 0.85; }

    /* View mode buttons — each with its own DNA color */
    #btnVisual { border-color: rgba(131,198,163,0.3); color: #2C4135; }
    #btnVisual.viewer__btn--active { background: #83C6A3; color: #2C4135; border-color: #83C6A3; }
    #btnVisual:hover:not(.viewer__btn--active) { background: rgba(131,198,163,0.1); }

    #btnCode { border-color: rgba(44,65,53,0.2); color: #2C4135; }
    #btnCode.viewer__btn--active { background: #2C4135; color: #F0EFEB; border-color: #2C4135; }
    #btnCode:hover:not(.viewer__btn--active) { background: rgba(44,65,53,0.06); }

    #btnRaw { border-color: rgba(3,0,0,0.1); color: var(--label-secondary, #333); }
    #btnRaw.viewer__btn--active { background: #1d1f21; color: #c5c8c6; border-color: #1d1f21; }
    #btnRaw:hover:not(.viewer__btn--active) { background: rgba(3,0,0,0.04); }

    /* Utility buttons */
    #btnWrap { border-color: rgba(255,149,0,0.2); color: #FF9500; }
    #btnWrap.viewer__btn--active { background: #FF9500; color: #fff; border-color: #FF9500; }
    #btnWrap:hover:not(.viewer__btn--active) { background: rgba(255,149,0,0.06); }

    #btnCopy { border-color: rgba(52,199,89,0.2); color: #34C759; }
    #btnCopy:hover { background: rgba(52,199,89,0.08); }

    #btnDownload { border-color: rgba(254,2,22,0.15); color: #FE0216; }
    #btnDownload:hover { background: rgba(254,2,22,0.06); }

    /* ── Meta bar (title + description) ── */
    .viewer__meta {
      padding: 12px 24px; display: none; gap: 12px;
      border-bottom: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      background: var(--surface-secondary, #FAFAF8); align-items: center;
    }
    .viewer__meta.is-visible { display: flex; }
    .viewer__meta-field {
      font-family: var(--font-body, 'DM Sans', sans-serif); font-size: 13px;
      border: 1px solid transparent; background: transparent; color: var(--label-primary);
      padding: 4px 8px; border-radius: 8px; outline: none; transition: all 200ms;
    }
    .viewer__meta-field:hover { background: rgba(3,0,0,0.03); }
    .viewer__meta-field:focus { border-color: var(--color-accent-mint, #83C6A3); background: #fff; }
    .viewer__meta-title { flex: 0 0 200px; font-weight: 600; }
    .viewer__meta-desc { flex: 1; font-style: italic; color: var(--label-secondary); }

    /* ── Code view ── */
    .viewer__code-wrap { flex: 1; overflow: auto; display: none; }
    .viewer__code-wrap pre {
      margin: 0; padding: 24px; min-height: 100%;
      font-size: 13px; line-height: 1.6; tab-size: 2; border-radius: 0;
      background: #1d1f21 !important;
    }
    .viewer__code-wrap code {
      font-family: var(--font-mono, 'JetBrains Mono', monospace) !important;
      font-size: 13px !important;
    }
    .viewer__code-wrap pre.wrap-lines code { white-space: pre-wrap; word-break: break-all; }

    /* ── Raw view ── */
    .viewer__raw {
      flex: 1; width: 100%; border: none; outline: none; resize: none;
      padding: 24px; font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 13px; line-height: 1.6; tab-size: 2;
      background: #1d1f21; color: #c5c8c6; display: none;
    }

    /* ── Visual preview (iframe) ── */
    .viewer__visual {
      flex: 1; display: none; background: #fff; position: relative;
    }
    .viewer__visual iframe {
      width: 100%; height: 100%; border: none;
    }
    .viewer__visual-error {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(255,255,255,0.95); color: #FF3B30;
      font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: 13px;
      padding: 40px; text-align: center; display: none;
    }
    .viewer__visual-error.is-visible { display: flex; }

    /* ── Loading / Empty ── */
    .viewer__loading {
      flex: 1; display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: var(--label-tertiary);
    }
    .viewer__loading.is-active { display: flex; }
    .viewer__spinner {
      width: 32px; height: 32px; border: 3px solid rgba(3,0,0,0.08);
      border-top-color: var(--color-accent-mint, #83C6A3);
      border-radius: 50%; animation: spin 800ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .viewer__empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--label-tertiary);
    }
    .viewer__empty-icon { font-size: 48px; opacity: 0.3; }
    .viewer__empty-text { font-size: 15px; font-weight: 500; }
    .viewer__empty-hint { font-size: 12px; opacity: 0.6; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface-brand, #2C4135); color: var(--label-on-dark, #F0EFEB);
      padding: 10px 24px; border-radius: 980px; font-size: 13px; font-weight: 500;
      box-shadow: 0 16px 48px rgba(3,0,0,0.12); z-index: 500;
      transition: transform 500ms cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none;
    }
    .toast.is-visible { transform: translateX(-50%) translateY(0); }
    .toast--error { background: #FF3B30; }

    /* ── Comment FAB ── */
    .comment-fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      width: 52px; height: 52px; border-radius: 50%; border: none;
      background: var(--surface-brand, #2C4135); color: var(--label-on-dark, #F0EFEB);
      font-size: 22px; cursor: pointer; display: none;
      align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(3,0,0,0.15), 0 0 0 0 rgba(131,198,163,0);
      transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .comment-fab.is-visible { display: flex; }
    .comment-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(3,0,0,0.2); }
    .comment-fab.is-active { background: var(--color-accent-mint, #83C6A3); color: var(--surface-brand, #2C4135); }
    .comment-fab__badge {
      position: absolute; top: -4px; right: -4px; min-width: 20px; height: 20px;
      border-radius: 10px; background: #FE0216; color: #fff;
      font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; padding: 0 5px;
    }

    /* ── Comment Panel ── */
    .comment-panel {
      position: fixed; bottom: 88px; right: 24px; z-index: 99;
      width: 380px; max-height: 520px;
      background: var(--surface-secondary, #FAFAF8);
      border: 1px solid var(--separator-default, rgba(3,0,0,0.08));
      border-radius: 20px; display: flex; flex-direction: column;
      box-shadow: 0 16px 64px rgba(3,0,0,0.12), 0 0 0 1px rgba(3,0,0,0.04);
      transform: translateY(20px) scale(0.95); opacity: 0; pointer-events: none;
      transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .comment-panel.is-open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

    .comment-panel__header {
      padding: 16px 20px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--separator-default, rgba(3,0,0,0.08));
    }
    .comment-panel__icon {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, #C9E5C3, #83C6A3);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .comment-panel__title {
      font-family: var(--font-display, 'Playfair Display', serif);
      font-size: 16px; font-weight: 700; flex: 1;
    }
    .comment-panel__count {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 10px; color: var(--label-tertiary); background: rgba(3,0,0,0.04);
      padding: 3px 8px; border-radius: 980px;
    }

    .comment-panel__list {
      flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px;
      min-height: 120px; max-height: 300px;
    }
    .comment-panel__empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--label-tertiary); padding: 24px;
    }
    .comment-panel__empty-icon { font-size: 28px; opacity: 0.4; }
    .comment-panel__empty-text { font-size: 12px; }

    /* Individual comment */
    .comment-bubble {
      display: flex; gap: 10px; animation: commentSlideIn 300ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes commentSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .comment-bubble__avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
    }
    .comment-bubble__body { flex: 1; min-width: 0; }
    .comment-bubble__header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
    .comment-bubble__author {
      font-size: 12px; font-weight: 700; color: var(--label-primary);
    }
    .comment-bubble__time {
      font-family: var(--font-mono, 'JetBrains Mono', monospace);
      font-size: 10px; color: var(--label-tertiary);
    }
    .comment-bubble__content {
      font-size: 13px; line-height: 1.5; color: var(--label-secondary);
      background: var(--surface-tertiary, #fff); padding: 8px 12px; border-radius: 12px;
      border-top-left-radius: 4px; word-break: break-word;
    }

    /* Compose area */
    .comment-compose {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--separator-default, rgba(3,0,0,0.08));
    }
    .comment-compose__author-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .comment-compose__author {
      flex: 1; font-family: var(--font-body, 'DM Sans', sans-serif); font-size: 12px;
      border: 1px solid var(--separator-default, rgba(3,0,0,0.08)); background: var(--surface-tertiary, #fff);
      padding: 6px 10px; border-radius: 8px; outline: none; color: var(--label-primary);
    }
    .comment-compose__author:focus { border-color: var(--color-accent-mint, #83C6A3); }
    .comment-compose__color-pick {
      display: flex; gap: 4px;
    }
    .comment-compose__color {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: all 150ms;
    }
    .comment-compose__color:hover { transform: scale(1.15); }
    .comment-compose__color.is-selected { border-color: var(--label-primary); box-shadow: 0 0 0 2px rgba(3,0,0,0.1); }

    .comment-compose__input-row {
      display: flex; gap: 8px;
    }
    .comment-compose__input {
      flex: 1; font-family: var(--font-body, 'DM Sans', sans-serif); font-size: 13px;
      border: 1px solid var(--separator-default, rgba(3,0,0,0.08)); background: var(--surface-tertiary, #fff);
      padding: 8px 12px; border-radius: 12px; outline: none; color: var(--label-primary);
      resize: none; min-height: 38px; max-height: 80px;
    }
    .comment-compose__input:focus { border-color: var(--color-accent-mint, #83C6A3); }
    .comment-compose__send {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: var(--surface-brand, #2C4135); color: var(--label-on-dark, #F0EFEB);
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 200ms; flex-shrink: 0;
    }
    .comment-compose__send:hover { background: var(--color-accent-mint, #83C6A3); color: var(--surface-brand, #2C4135); }
    .comment-compose__send:disabled { opacity: 0.4; cursor: default; }

    .comment-panel__list::-webkit-scrollbar { width: 4px; }
    .comment-panel__list::-webkit-scrollbar-thumb { background: rgba(3,0,0,0.1); border-radius: 2px; }

    /* ── Responsive ── */
    @media (max-width: 734px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid rgba(3,0,0,0.08); }
      .sidebar-toggle, .sidebar-expand { display: none !important; }
    }

    /* ── Scrollbars ── */
    .file-list::-webkit-scrollbar, .viewer__code-wrap::-webkit-scrollbar { width: 6px; }
    .file-list::-webkit-scrollbar-thumb { background: rgba(3,0,0,0.12); border-radius: 3px; }
    .viewer__code-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <span class="topbar__logo"><img src="logo.avif" alt="DNA"></span>
    <span class="topbar__title">JSX Viewer</span>
    <span class="topbar__badge">v3.0</span>
    <div class="topbar__status" id="status">
      <span class="topbar__dot" id="statusDot"></span>
      <span id="statusLabel">Connected</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" title="Collapse sidebar">&#x25C0;</button>
      <div class="sidebar__header">
        <div class="sidebar__title">Files</div>
      </div>

      <div class="search">
        <span class="search__icon">&#x1F50D;</span>
        <input class="search__input" id="searchInput" type="text" placeholder="Search files...">
      </div>

      <div class="upload" id="uploadZone">
        <div class="upload__icon">&#x2601;</div>
        <p class="upload__text">Drop .jsx files here</p>
        <p class="upload__hint">Uploads to cloud — visible to everyone</p>
        <input type="file" id="fileInput" accept=".jsx,.js,.tsx,.ts" multiple>
      </div>

      <div class="progress" id="progress">
        <div class="progress__bar" id="progressBar"></div>
      </div>

      <div class="sidebar__count" id="fileCount">Loading...</div>
      <div class="file-list" id="fileList"></div>
    </aside>

    <!-- Expand sidebar button (visible when collapsed) -->
    <button class="sidebar-expand" id="sidebarExpand" title="Show files">&#x25B6;</button>

    <!-- Viewer -->
    <div class="viewer">
      <div class="viewer__toolbar" id="toolbar" style="display:none;">
        <span class="viewer__filename" id="viewerFilename"></span>
        <span class="viewer__line-count" id="viewerLines"></span>
        <div class="viewer__actions">
          <button class="viewer__btn viewer__btn--active" id="btnVisual">Visual</button>
          <button class="viewer__btn" id="btnCode">Code</button>
          <button class="viewer__btn" id="btnRaw">Raw</button>
          <button class="viewer__btn" id="btnWrap">Wrap</button>
          <button class="viewer__btn" id="btnCopy">Copy</button>
          <button class="viewer__btn" id="btnDownload">Download</button>
        </div>
      </div>

      <!-- Meta: title + description -->
      <div class="viewer__meta" id="metaBar">
        <input class="viewer__meta-field viewer__meta-title" id="metaTitle" placeholder="Add a title..." maxlength="100">
        <input class="viewer__meta-field viewer__meta-desc" id="metaDesc" placeholder="Add a description...">
      </div>

      <!-- Visual preview -->
      <div class="viewer__visual" id="visualView">
        <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
        <div class="viewer__visual-error" id="previewError">
          <div style="font-size:32px;">&#x26A0;</div>
          <div id="previewErrorMsg">Preview error</div>
        </div>
      </div>

      <!-- Code view -->
      <div class="viewer__code-wrap" id="codeWrap">
        <pre><code class="language-jsx" id="codeBlock"></code></pre>
      </div>

      <!-- Raw -->
      <textarea class="viewer__raw" id="rawView" readonly></textarea>

      <!-- Loading -->
      <div class="viewer__loading" id="loading">
        <div class="viewer__spinner"></div>
        <span>Loading file...</span>
      </div>

      <!-- Empty -->
      <div class="viewer__empty" id="emptyState">
        <div class="viewer__empty-icon">{ }</div>
        <div class="viewer__empty-text">Select a file to view</div>
        <div class="viewer__empty-hint">Upload .jsx files or select from the list</div>
      </div>
    </div>
  </div>

  <!-- Comment FAB -->
  <button class="comment-fab" id="commentFab" title="Comments">
    &#x1F4AC;
    <span class="comment-fab__badge" id="commentBadge" style="display:none;">0</span>
  </button>

  <!-- Comment Panel -->
  <div class="comment-panel" id="commentPanel">
    <div class="comment-panel__header">
      <div class="comment-panel__icon">&#x1F4AC;</div>
      <div class="comment-panel__title">Comments</div>
      <span class="comment-panel__count" id="commentCount">0</span>
    </div>
    <div class="comment-panel__list" id="commentList">
      <div class="comment-panel__empty" id="commentEmpty">
        <div class="comment-panel__empty-icon">&#x1F4AD;</div>
        <div class="comment-panel__empty-text">No comments yet. Be the first!</div>
      </div>
    </div>
    <div class="comment-compose">
      <div class="comment-compose__author-row">
        <input class="comment-compose__author" id="commentAuthor" placeholder="Your name..." maxlength="50">
        <div class="comment-compose__color-pick" id="commentColors"></div>
      </div>
      <div class="comment-compose__input-row">
        <textarea class="comment-compose__input" id="commentInput" placeholder="Write a comment..." maxlength="500" rows="1"></textarea>
        <button class="comment-compose__send" id="commentSend" disabled title="Send">&#x27A4;</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Prism -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-jsx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-tsx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>

  <script>
  (function() {
    'use strict';

    // ═══════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════
    let files = [];
    let activeFile = null;
    let activeContent = null;
    let viewMode = 'visual';
    let wrapLines = false;
    let metaDirty = false;

    const $ = id => document.getElementById(id);
    let sidebarCollapsed = false;

    // DOM
    const fileListEl = $('fileList'), fileCountEl = $('fileCount');
    const fileInput = $('fileInput'), uploadZone = $('uploadZone');
    const progressEl = $('progress'), progressBar = $('progressBar');
    const searchInput = $('searchInput');
    const toolbar = $('toolbar'), viewerFilename = $('viewerFilename'), viewerLines = $('viewerLines');
    const codeWrap = $('codeWrap'), codeBlock = $('codeBlock'), rawView = $('rawView');
    const visualView = $('visualView'), previewFrame = $('previewFrame');
    const previewError = $('previewError'), previewErrorMsg = $('previewErrorMsg');
    const loadingEl = $('loading'), emptyState = $('emptyState');
    const metaBar = $('metaBar'), metaTitle = $('metaTitle'), metaDesc = $('metaDesc');
    const btnVisual = $('btnVisual'), btnCode = $('btnCode'), btnRaw = $('btnRaw');
    const btnWrap = $('btnWrap'), btnCopy = $('btnCopy'), btnDownload = $('btnDownload');
    const toastEl = $('toast');

    // ═══════════════════════════════════════
    // API HELPERS
    // ═══════════════════════════════════════
    async function api(path, opts) {
      const res = await fetch('/api' + path, opts);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text);
      }
      const ct = res.headers.get('content-type') || '';
      return ct.includes('json') ? res.json() : res.text();
    }

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    async function init() {
      setupEvents();
      fileCountEl.textContent = 'Loading...';
      try {
        files = await api('/files');
        setStatus(true);
      } catch (e) {
        console.error('Init error:', e);
        setStatus(false);
        files = [];
      }
      renderFileList();
    }

    function setStatus(online) {
      $('statusDot').className = online ? 'topbar__dot' : 'topbar__dot topbar__dot--offline';
      $('statusLabel').textContent = online ? 'Connected' : 'Offline';
    }

    // ═══════════════════════════════════════
    // RENDER FILE LIST
    // ═══════════════════════════════════════
    function formatSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function groupByMonth(list) {
      const g = {};
      list.forEach(f => {
        const d = new Date(f.createdAt);
        const k = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
        (g[k] = g[k] || []).push(f);
      });
      return g;
    }

    function renderFileList(filter) {
      filter = (filter || '').toLowerCase();
      const filtered = filter
        ? files.filter(f => f.filename.toLowerCase().includes(filter) || (f.title && f.title.toLowerCase().includes(filter)))
        : files;

      fileCountEl.textContent = filtered.length + ' file' + (filtered.length !== 1 ? 's' : '');
      const groups = groupByMonth(filtered);
      let html = '';

      for (const month in groups) {
        html += '<div class="file-list__group">' + month + '</div>';
        groups[month].forEach(f => {
          const ext = f.filename.split('.').pop().toUpperCase();
          const active = activeFile && f.id === activeFile.id;
          const displayName = f.title || f.filename;
          html += '<div class="file-item ' + (active ? 'is-active' : '') + '" data-id="' + f.id + '">' +
            '<div class="file-item__icon">' + ext + '</div>' +
            '<div class="file-item__info">' +
              '<div class="file-item__name" title="' + f.filename + '">' + displayName + '</div>' +
              (f.description ? '<div class="file-item__desc">' + f.description + '</div>' : '') +
              '<div class="file-item__meta">' +
                '<span>' + formatDate(f.createdAt) + '</span>' +
                '<span class="file-item__size">' + formatSize(f.size) + '</span>' +
                '<span style="color:var(--color-accent-mint);">&#x2601;</span>' +
              '</div>' +
            '</div>' +
            '<button class="file-item__delete" data-id="' + f.id + '" title="Remove">&times;</button>' +
          '</div>';
        });
      }

      if (!filtered.length) {
        html = '<div style="text-align:center;padding:40px 20px;color:var(--label-tertiary);font-size:13px;">No files found</div>';
      }
      fileListEl.innerHTML = html;

      // Bind clicks
      fileListEl.querySelectorAll('.file-item').forEach(el => {
        el.addEventListener('click', () => selectFile(el.dataset.id));
      });
      fileListEl.querySelectorAll('.file-item__delete').forEach(el => {
        el.addEventListener('click', e => { e.stopPropagation(); deleteFile(el.dataset.id); });
      });
    }

    // ═══════════════════════════════════════
    // SELECT FILE
    // ═══════════════════════════════════════
    async function selectFile(id) {
      const file = files.find(f => f.id === id);
      if (!file) return;
      activeFile = file;
      renderFileList(searchInput.value);

      // Show meta
      metaTitle.value = file.title || '';
      metaDesc.value = file.description || '';
      metaDirty = false;
      clearTimeout(metaSaveTimer);
      metaBar.classList.add('is-visible');

      // Show loading
      showLoading();
      toolbar.style.display = 'flex';
      viewerFilename.textContent = file.filename;
      viewerLines.textContent = 'Loading...';

      // Show comment FAB and load comments
      commentFab.classList.add('is-visible');
      loadComments(id);

      try {
        activeContent = await api('/files/' + id + '/content');
        showFile();
      } catch (e) {
        console.error('Fetch content error:', e);
        showToast('Failed to load file', true);
        showEmpty();
      }
    }

    // ═══════════════════════════════════════
    // SHOW FILE
    // ═══════════════════════════════════════
    function showFile() {
      emptyState.style.display = 'none';
      loadingEl.classList.remove('is-active');
      toolbar.style.display = 'flex';

      const lines = activeContent.split('\n').length;
      viewerLines.textContent = lines + ' lines';

      const ext = activeFile.filename.split('.').pop().toLowerCase();
      const langMap = { jsx: 'jsx', tsx: 'tsx', js: 'javascript', ts: 'typescript' };
      codeBlock.className = 'language-' + (langMap[ext] || 'javascript');
      codeBlock.textContent = activeContent;
      rawView.value = activeContent;

      if (typeof Prism !== 'undefined') Prism.highlightElement(codeBlock);

      setViewMode(viewMode);
    }

    // ═══════════════════════════════════════
    // VIEW MODES
    // ═══════════════════════════════════════
    function setViewMode(mode) {
      viewMode = mode;
      visualView.style.display = 'none';
      codeWrap.style.display = 'none';
      rawView.style.display = 'none';
      previewError.classList.remove('is-visible');

      [btnVisual, btnCode, btnRaw].forEach(b => b.classList.remove('viewer__btn--active'));

      // Wrap button only visible in Code mode
      btnWrap.style.display = (mode === 'code') ? '' : 'none';

      if (mode === 'visual') {
        btnVisual.classList.add('viewer__btn--active');
        visualView.style.display = 'block';
        renderVisualPreview();
      } else if (mode === 'code') {
        btnCode.classList.add('viewer__btn--active');
        codeWrap.style.display = 'block';
      } else {
        btnRaw.classList.add('viewer__btn--active');
        rawView.style.display = 'block';
      }
    }

    // ═══════════════════════════════════════
    // VISUAL PREVIEW (React in iframe)
    // ═══════════════════════════════════════
    function renderVisualPreview() {
      if (!activeContent) return;
      previewError.classList.remove('is-visible');

      let code = activeContent;

      // Remove all import statements (single and multi-line)
      code = code.replace(/^import\s[\s\S]*?from\s+['"][^'"]+['"];?\s*$/gm, '');
      code = code.replace(/^import\s+['"][^'"]+['"];?\s*$/gm, '');

      // Remove "export default" but keep the expression
      code = code.replace(/export\s+default\s+/g, '');
      // Remove named exports: "export const" → "const", "export function" → "function"
      code = code.replace(/export\s+(const|function|class|let|var)\s/g, '$1 ');

      // Find ALL component names (PascalCase functions/consts) — pick the last one as main
      const allMatches = [...code.matchAll(/(?:const|function)\s+([A-Z][A-Za-z0-9]*)/g)];
      const componentName = allMatches.length ? allMatches[allMatches.length - 1][1] : null;

      // Escape backticks and backslashes in user code for template literal safety
      const safeCode = code.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');

      const iframeHtml = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    #root { min-height: 100vh; }
    .preview-error { padding: 40px; text-align: center; color: #FF3B30; font-family: monospace; font-size: 13px; }
    .preview-loading { padding: 40px; text-align: center; color: #999; font-family: sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"><div class="preview-loading">Loading preview...</div></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      window.parent.postMessage({ type: 'preview-error', message: (err && err.message) || msg }, '*');
      return true;
    };
  <\/script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
  <script>
    (function() {
      try {
        var { useState, useEffect, useRef, useCallback, useMemo, useContext, createContext, Fragment, memo, forwardRef, useReducer, useLayoutEffect } = React;

        var jsxCode = ${JSON.stringify(code)};
        ${componentName ? `jsxCode += "\\nvar __ROOT_COMP = " + ${JSON.stringify(componentName)} + ";";` : ''}

        var transformed = Babel.transform(jsxCode, { presets: ['react'] }).code;
        var fn = new Function('React', 'useState', 'useEffect', 'useRef', 'useCallback', 'useMemo', 'useContext', 'createContext', 'Fragment', 'memo', 'forwardRef', 'useReducer', 'useLayoutEffect', transformed + '; return typeof __ROOT_COMP !== "undefined" ? __ROOT_COMP : null;');
        var Comp = fn(React, useState, useEffect, useRef, useCallback, useMemo, useContext, createContext, Fragment, memo, forwardRef, useReducer, useLayoutEffect);

        ${componentName ? `
        if (Comp) {
          var root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(React.createElement(Comp));
        } else {
          document.getElementById('root').innerHTML = '<div class="preview-error">Component "${componentName}" not found after evaluation</div>';
        }
        ` : `
        document.getElementById('root').innerHTML = '<div class="preview-error">No renderable component found</div>';
        `}
      } catch(e) {
        window.parent.postMessage({ type: 'preview-error', message: e.message }, '*');
        document.getElementById('root').innerHTML = '<div class="preview-error">' + e.message + '</div>';
      }
    })();
  <\/script>
  <\/script>
  <script>
    window.addEventListener('error', function(e) {
      window.parent.postMessage({ type: 'preview-error', message: e.message }, '*');
    });
  <\/script>
</body>
</html>`;

      const blob = new Blob([iframeHtml], { type: 'text/html' });
      previewFrame.src = URL.createObjectURL(blob);
    }

    // Listen for preview errors
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'preview-error') {
        previewErrorMsg.textContent = e.data.message;
        previewError.classList.add('is-visible');
      }
    });

    // ═══════════════════════════════════════
    // UPLOAD
    // ═══════════════════════════════════════
    async function handleUpload(filesList) {
      const valid = Array.from(filesList).filter(f => {
        const ext = f.name.split('.').pop().toLowerCase();
        return ['jsx', 'js', 'tsx', 'ts'].includes(ext);
      });
      if (!valid.length) return showToast('Only .jsx, .js, .tsx, .ts files accepted', true);

      uploadZone.classList.add('is-uploading');
      progressEl.classList.add('is-active');

      const fd = new FormData();
      valid.forEach(f => fd.append('files', f));

      try {
        progressBar.style.width = '30%';
        const results = await fetch('/api/files', { method: 'POST', body: fd }).then(r => r.json());
        progressBar.style.width = '100%';

        if (Array.isArray(results) && results.length) {
          // Refresh file list
          files = await api('/files');
          renderFileList(searchInput.value);

          // Auto-select the first uploaded
          selectFile(results[0].id);
          showToast(results.length + ' file' + (results.length > 1 ? 's' : '') + ' uploaded');
        }
      } catch (e) {
        console.error('Upload error:', e);
        showToast('Upload failed', true);
      }

      setTimeout(() => {
        uploadZone.classList.remove('is-uploading');
        progressEl.classList.remove('is-active');
        progressBar.style.width = '0%';
      }, 600);
    }

    // ═══════════════════════════════════════
    // DELETE
    // ═══════════════════════════════════════
    async function deleteFile(id) {
      const file = files.find(f => f.id === id);
      if (!file || !confirm('Remove "' + file.filename + '"?')) return;

      try {
        await api('/files/' + id, { method: 'DELETE' });
        files = files.filter(f => f.id !== id);
        if (activeFile && activeFile.id === id) { activeFile = null; activeContent = null; showEmpty(); }
        renderFileList(searchInput.value);
        showToast(file.filename + ' removed');
      } catch (e) {
        showToast('Delete failed', true);
      }
    }

    // ═══════════════════════════════════════
    // SAVE META (autosave with debounce)
    // ═══════════════════════════════════════
    let metaSaveTimer;
    async function saveMeta() {
      if (!activeFile || !metaDirty) return;
      try {
        const updated = await api('/files/' + activeFile.id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: metaTitle.value.trim(), description: metaDesc.value.trim() }),
        });
        Object.assign(activeFile, updated);
        const idx = files.findIndex(f => f.id === activeFile.id);
        if (idx >= 0) files[idx] = activeFile;
        metaDirty = false;
        renderFileList(searchInput.value);
        showToast('Saved');
      } catch (e) {
        showToast('Save failed', true);
      }
    }

    function scheduleAutoSave() {
      metaDirty = true;
      clearTimeout(metaSaveTimer);
      metaSaveTimer = setTimeout(saveMeta, 800);
    }

    // ═══════════════════════════════════════
    // UI HELPERS
    // ═══════════════════════════════════════
    function showEmpty() {
      emptyState.style.display = 'flex';
      toolbar.style.display = 'none';
      metaBar.classList.remove('is-visible');
      visualView.style.display = 'none';
      codeWrap.style.display = 'none';
      rawView.style.display = 'none';
      loadingEl.classList.remove('is-active');
      commentFab.classList.remove('is-visible');
      commentPanel.classList.remove('is-open');
      commentPanelOpen = false;
    }

    function showLoading() {
      emptyState.style.display = 'none';
      visualView.style.display = 'none';
      codeWrap.style.display = 'none';
      rawView.style.display = 'none';
      loadingEl.classList.add('is-active');
    }

    let toastTimer;
    function showToast(msg, isError) {
      toastEl.textContent = msg;
      toastEl.className = 'toast is-visible' + (isError ? ' toast--error' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('is-visible'), 2500);
    }

    async function copyToClipboard() {
      if (!activeContent) return;
      try { await navigator.clipboard.writeText(activeContent); showToast('Copied'); }
      catch (e) { showToast('Copy failed', true); }
    }

    function downloadFile() {
      if (!activeFile || !activeContent) return;
      const blob = new Blob([activeContent], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = activeFile.filename;
      a.click();
    }

    // ═══════════════════════════════════════
    // EVENTS
    // ═══════════════════════════════════════
    function setupEvents() {
      fileInput.addEventListener('change', e => { handleUpload(e.target.files); fileInput.value = ''; });

      uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('is-dragover'); });
      uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('is-dragover'));
      uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('is-dragover'); handleUpload(e.dataTransfer.files); });

      document.body.addEventListener('dragover', e => e.preventDefault());
      document.body.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files.length) handleUpload(e.dataTransfer.files); });

      searchInput.addEventListener('input', () => renderFileList(searchInput.value));

      btnVisual.addEventListener('click', () => setViewMode('visual'));
      btnCode.addEventListener('click', () => setViewMode('code'));
      btnRaw.addEventListener('click', () => setViewMode('raw'));
      btnWrap.addEventListener('click', () => {
        wrapLines = !wrapLines;
        codeWrap.querySelector('pre').classList.toggle('wrap-lines', wrapLines);
        btnWrap.classList.toggle('viewer__btn--active', wrapLines);
      });
      btnCopy.addEventListener('click', copyToClipboard);
      btnDownload.addEventListener('click', downloadFile);

      // Meta fields — autosave on input
      metaTitle.addEventListener('input', scheduleAutoSave);
      metaDesc.addEventListener('input', scheduleAutoSave);
      metaTitle.addEventListener('blur', () => { if (metaDirty) saveMeta(); });
      metaDesc.addEventListener('blur', () => { if (metaDirty) saveMeta(); });

      // Sidebar collapse/expand
      $('sidebarToggle').addEventListener('click', toggleSidebar);
      $('sidebarExpand').addEventListener('click', toggleSidebar);
    }

    function toggleSidebar() {
      sidebarCollapsed = !sidebarCollapsed;
      const sidebar = $('sidebar');
      const expand = $('sidebarExpand');
      sidebar.classList.toggle('is-collapsed', sidebarCollapsed);
      expand.classList.toggle('is-visible', sidebarCollapsed);
    }

    // ═══════════════════════════════════════
    // COMMENTS
    // ═══════════════════════════════════════
    const COMMENT_COLORS = [
      { name: 'Mint', bg: '#83C6A3' },
      { name: 'Brand Green', bg: '#2C4135' },
      { name: 'Neon', bg: '#9CE68C' },
      { name: 'Signal Red', bg: '#FE0216' },
      { name: 'Pink', bg: '#F8737D' },
      { name: 'Warning', bg: '#FF9500' },
      { name: 'Success', bg: '#34C759' },
      { name: 'Dark', bg: '#030000' },
    ];

    let comments = [];
    let commentPanelOpen = false;
    let selectedColor = COMMENT_COLORS[0];

    const commentFab = $('commentFab');
    const commentPanel = $('commentPanel');
    const commentList = $('commentList');
    const commentEmpty = $('commentEmpty');
    const commentBadge = $('commentBadge');
    const commentCount = $('commentCount');
    const commentAuthor = $('commentAuthor');
    const commentInput = $('commentInput');
    const commentSend = $('commentSend');
    const commentColors = $('commentColors');

    // Restore saved author name
    const savedAuthor = localStorage.getItem('jsx_comment_author') || '';
    const savedColorIdx = parseInt(localStorage.getItem('jsx_comment_color') || '0', 10);
    commentAuthor.value = savedAuthor;
    selectedColor = COMMENT_COLORS[savedColorIdx] || COMMENT_COLORS[0];

    // Render color picker
    COMMENT_COLORS.forEach((c, i) => {
      const btn = document.createElement('div');
      btn.className = 'comment-compose__color' + (i === savedColorIdx ? ' is-selected' : '');
      btn.style.background = c.bg;
      btn.title = c.name;
      btn.addEventListener('click', () => {
        commentColors.querySelectorAll('.comment-compose__color').forEach(b => b.classList.remove('is-selected'));
        btn.classList.add('is-selected');
        selectedColor = c;
        localStorage.setItem('jsx_comment_color', String(i));
      });
      commentColors.appendChild(btn);
    });

    // Toggle panel
    commentFab.addEventListener('click', () => {
      commentPanelOpen = !commentPanelOpen;
      commentPanel.classList.toggle('is-open', commentPanelOpen);
      commentFab.classList.toggle('is-active', commentPanelOpen);
      if (commentPanelOpen) {
        commentInput.focus();
        scrollCommentsToBottom();
      }
    });

    // Close panel on outside click
    document.addEventListener('click', (e) => {
      if (commentPanelOpen && !commentPanel.contains(e.target) && !commentFab.contains(e.target)) {
        commentPanelOpen = false;
        commentPanel.classList.remove('is-open');
        commentFab.classList.remove('is-active');
      }
    });

    // Enable/disable send
    commentInput.addEventListener('input', () => {
      commentSend.disabled = !commentInput.value.trim();
      // Auto-resize
      commentInput.style.height = 'auto';
      commentInput.style.height = Math.min(commentInput.scrollHeight, 80) + 'px';
    });

    // Save author on change
    commentAuthor.addEventListener('input', () => {
      localStorage.setItem('jsx_comment_author', commentAuthor.value);
    });

    // Send on Enter (Shift+Enter for newline)
    commentInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        postComment();
      }
    });

    commentSend.addEventListener('click', postComment);

    async function postComment() {
      const content = commentInput.value.trim();
      const author = commentAuthor.value.trim() || 'Anonymous';
      if (!content || !activeFile) return;

      commentSend.disabled = true;
      try {
        const comment = await api('/files/' + activeFile.id + '/comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, content, color: selectedColor.bg }),
        });
        comments.push(comment);
        renderComments();
        commentInput.value = '';
        commentInput.style.height = 'auto';
        localStorage.setItem('jsx_comment_author', author);
        scrollCommentsToBottom();
      } catch (e) {
        showToast('Comment failed', true);
      }
      commentSend.disabled = !commentInput.value.trim();
    }

    async function loadComments(fileId) {
      try {
        comments = await api('/files/' + fileId + '/comments');
      } catch (e) {
        comments = [];
      }
      renderComments();
    }

    function renderComments() {
      const count = comments.length;
      commentCount.textContent = count;
      commentBadge.textContent = count;
      commentBadge.style.display = count > 0 ? 'flex' : 'none';
      commentEmpty.style.display = count === 0 ? 'flex' : 'none';

      // Remove all bubbles (keep empty state)
      commentList.querySelectorAll('.comment-bubble').forEach(el => el.remove());

      comments.forEach(c => {
        const color = c.color || '#83C6A3';
        const initials = c.author.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const time = formatCommentTime(c.createdAt);

        const bubble = document.createElement('div');
        bubble.className = 'comment-bubble';
        bubble.innerHTML =
          '<div class="comment-bubble__avatar" style="background:' + color + ';">' + initials + '</div>' +
          '<div class="comment-bubble__body">' +
            '<div class="comment-bubble__header">' +
              '<span class="comment-bubble__author">' + escapeHtml(c.author) + '</span>' +
              '<span class="comment-bubble__time">' + time + '</span>' +
            '</div>' +
            '<div class="comment-bubble__content">' + escapeHtml(c.content) + '</div>' +
          '</div>';
        commentList.appendChild(bubble);
      });
    }

    function formatCommentTime(d) {
      const date = new Date(d);
      const now = new Date();
      const diff = (now - date) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) +
        ' ' + date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function scrollCommentsToBottom() {
      requestAnimationFrame(() => { commentList.scrollTop = commentList.scrollHeight; });
    }

    // ═══════════════════════════════════════
    // BOOT
    // ═══════════════════════════════════════
    init();
  })();
  </script>
</body>
</html>
